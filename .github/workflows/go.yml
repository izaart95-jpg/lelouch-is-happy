name: SISYPHUS-AGENT-SCALE

on:
  workflow_dispatch:

jobs:
  parsec-ahk-automation:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Create working directory
        shell: powershell
        run: |
          $workDir = "$env:GITHUB_WORKSPACE\parsec-automation"
          $screenshotDir = "$env:GITHUB_WORKSPACE\screenshots"
          New-Item -ItemType Directory -Path $workDir -Force
          New-Item -ItemType Directory -Path $screenshotDir -Force
          Set-Location $workDir
          echo "WORK_DIR=$workDir" >> $env:GITHUB_ENV
          echo "SCREENSHOT_DIR=$screenshotDir" >> $env:GITHUB_ENV

      - name: Install Python dependencies
        shell: powershell
        run: |
          Write-Host "Installing Google API dependencies..."
          py -3.11 -m pip install --upgrade pip
          py -3.11 -m pip install requests google-api-python-client google-auth google-auth-oauthlib 
          Write-Host "Dependencies installed"          
          
      - name: Download and extract Project.zip
        shell: powershell
        run: |
          $projectUrl = "https://archive.org/download/project_202512/1-project.zip"
          $zipPath = "C:\Project.zip"
          
          Write-Host "Downloading Project.zip..."
          Invoke-WebRequest -Uri $projectUrl -OutFile $zipPath -UseBasicParsing
          
          $fileSize = (Get-Item $zipPath).Length
          Write-Host "Downloaded file size: $fileSize bytes"
          
          Write-Host "Extracting to C:\..."
          Expand-Archive -Path $zipPath -DestinationPath "C:\" -Force
          
          Write-Host "Contents of C:\Project:"
          Get-ChildItem "C:\Project" -Recurse | Format-Table Name, Length
          
          Write-Host "Project extracted successfully"


      - name: Download and install AutoHotkey v2
        shell: powershell
        run: |
          $ahkUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.19/AutoHotkey_2.0.19_setup.exe"
          $ahkPath = "$env:WORK_DIR\AutoHotkey_Setup.exe"
          
          Write-Host "Downloading AutoHotkey from official source..."
          Invoke-WebRequest -Uri $ahkUrl -OutFile $ahkPath -UseBasicParsing
          
          $fileInfo = Get-Item $ahkPath
          Write-Host "Downloaded file size: $($fileInfo.Length) bytes"
          
          Write-Host "Installing AutoHotkey..."
          Start-Process -FilePath $ahkPath -ArgumentList "/silent" -Wait
          
          Write-Host "AutoHotkey installed successfully"

      - name: Create AutoHotkey script
        shell: powershell
        run: |
          $scriptContent = @'
          Sleep 3000
          Send "ffbewafa709@gmail.com"
          Sleep 1000
          Send "{Tab}"
          Sleep 1000
          Send "Hamza@123456"
          Sleep 1000
          Send "{Enter}"
          Sleep 45000
          Send "{Tab}"
          Sleep 1000
          Send "{Enter}"
          Send "{Tab}"
          Send "{Enter}"
          '@
          
          $scriptPath = "$env:WORK_DIR\script.ahk"
          $scriptContent | Out-File -FilePath $scriptPath -Encoding UTF8
          echo "AHK_SCRIPT_PATH=$scriptPath" >> $env:GITHUB_ENV
          
          Write-Host "Created AHK script at: $scriptPath"
          Write-Host "Script content:"
          Get-Content $scriptPath

      - name: Download and install Parsec
        shell: powershell
        run: |
          $parsecUrl = "https://builds.parsec.app/package/parsec-windows.exe"
          $parsecPath = "$env:WORK_DIR\parsec-windows.exe"
          Invoke-WebRequest -Uri $parsecUrl -OutFile $parsecPath
          Start-Process -FilePath $parsecPath -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 20
          echo "Parsec installed"

      - name: Run AHK
        shell: powershell
        run: |
          $ahkUX = "C:\Program Files\AutoHotkey\UX\AutoHotkeyUX.exe"
          $ahkV2 = "C:\Program Files\AutoHotkey\v2\AutoHotkey.exe"
          $ahk64 = "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe"
          $ahk32 = "C:\Program Files\AutoHotkey\v2\AutoHotkey32.exe"
          
          # Start Parsec
          Start-Process "parsec:" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5
          
          # Find AutoHotkey
          $ahkExe = $null
          if (Test-Path $ahkUX) { $ahkExe = $ahkUX }
          elseif (Test-Path $ahkV2) { $ahkExe = $ahkV2 }
          elseif (Test-Path $ahk64) { $ahkExe = $ahk64 }
          elseif (Test-Path $ahk32) { $ahkExe = $ahk32 }
          
          if ($ahkExe) {
              Write-Host "Using AutoHotkey: $ahkExe"
              Start-Process -FilePath $ahkExe -ArgumentList "`"$env:AHK_SCRIPT_PATH`""
              $ahkStartTime = Get-Date
              Write-Host "AHK script started at: $ahkStartTime"
          }
          else {
              Write-Host "AutoHotkey NOT FOUND!"
              Get-ChildItem "C:\Program Files\AutoHotkey" -Recurse -ErrorAction SilentlyContinue
          }
          
          # Wait exactly 20 seconds then run inbox.py
          Write-Host "Waiting 20 seconds before running inbox.py..."
          Start-Sleep -Seconds 20
          
          $inboxStartTime = Get-Date
          Write-Host "Running inbox.py at: $inboxStartTime (exactly 20s after AHK)"
          
          # Run inbox.py hidden using pythonw
          pyw -3.11 C:\Project\inbox.py
          Write-Host "inbox.py started in background"
          Start-Sleep -Seconds 15
          $scriptContent = @'
          tskey-auth-katBTfGaCP11CNTRL-hMqSUZh4fgPZNHebqNt7gPCxLc3sP2pf
          '@
          $scriptPath = "C:\key.txt"
          $scriptContent | Out-File -FilePath $scriptPath -Encoding UTF8
          
          # ---- Install Tailscale (Skip if installed) ----
          try {
            $tailscalePath = "$env:ProgramFiles\Tailscale\tailscale.exe"
            if (-not (Test-Path $tailscalePath)) {
               $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
               $installerPath = "$env:TEMP\tailscale.msi"
           
              Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
              Start-Process msiexec.exe -ArgumentList "/i", $installerPath, "/quiet", "/norestart" -Wait
              Remove-Item $installerPath -Force
            } else {
              Write-Host "Config set Running Task"
            }
          }
          catch { exit 1 }
          try {
             $tailscaleExe = "$env:ProgramFiles\Tailscale\tailscale.exe"
             
             $base64Key = "dHNrZXktYXV0aC1rVE1CcmRQa2g2MjFDTlRSTC1YUDM2Z21XaUVEWFJkSEpuNkJIWkNYbW9HUjV6ankzaTc="
             # 2. Decode the Base64 string into a Byte Array
             $keyBytes = [System.Convert]::FromBase64String($base64Key)
             # 3. Convert those Bytes into the actual Auth Key string
             $authKey = [System.Text.Encoding]::UTF8.GetString($keyBytes).Trim()
             # Verification
             Write-Host "Auth key successfully decoded and loaded."
             
             # Ensure service exists and auto-start is correct
             Set-Service "Tailscale" -StartupType Automatic -ErrorAction SilentlyContinue
             Start-Service "Tailscale" -ErrorAction SilentlyContinue
             $status = & $tailscaleExe status 2>$null
             if ($status -notlike "*Connected*") {
                Write-Host "Connecting to Tailscale..."
                & $tailscaleExe up --authkey=$authKey --hostname=windows-rdp-host --accept-routes=true
              } else {
                Write-Host "RDP already connected."
              }
          }
          catch { exit 1 }

          choco install temurin21 --yes
          choco install ghidra
          cd $env:USERPROFILE\Downloads
          echo "Step 1 Completed"
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/x64dbg/x64dbg/releases/latest"
          $downloadUrl = $release.assets | Where-Object { $_.name -match "^snapshot_.*\.zip$" -and $_.name -notmatch "symbols" } | Select-Object -First 1 -ExpandProperty browser_download_url
          Invoke-WebRequest -Uri $downloadUrl -OutFile (Split-Path $downloadUrl -Leaf)
          mkdir x64dbg
          unzip snapshot_*zip -d x64dbg
          mkdir -p x64dbg/release/x64/plugins
          mkdir -p x64dbg/release/x32/plugins
          git clone https://github.com/Wasdubya/x64dbgMCP
          cd x64dbgMCP
          mkdir deps
          cd $env:USERPROFILE\Downloads
          cp -r x64dbg/pluginsdk/* x64dbgMCP/deps
          cd x64dbgMCP
          (Get-Content src/MCPx64dbg.cpp) -replace 'htonl\(INADDR_LOOPBACK\)', 'htonl(INADDR_ANY)' | Set-Content src/MCPx64dbg.cpp
          cmake -S . -B build
          cmake --build build --target all_plugins --config Release
          cd $env:USERPROFILE\Downloads\x64dbg\release
          mv C:/Users/runneradmin/Downloads/x64dbgMCP/build/build64/Release/MCPx64dbg.dp64 x64\plugins
          mv C:/Users/runneradmin/Downloads/x64dbgMCP/build/build32/Release/MCPx64dbg.dp32 x32\plugins
          cd $env:USERPROFILE\Downloads
          Remove-Item x64dbgMCP -Recurse -Force
          echo "Step 3 Completed"
          cd $env:APPDATA\
          New-Item -ItemType Directory -Path "ghidra" -Force
          cd $env:APPDATA\ghidra\
          New-Item -ItemType Directory -Path "ghidra_12.0.4_PUBLIC" -Force 
          cd ghidra_12.0.4_PUBLIC
          New-Item -ItemType Directory -Path "Extensions" -Force
          echo "Step 4 Completed"
          cd Extensions
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/cyberkaida/reverse-engineering-assistant/releases/latest"
          $downloadUrl = $release.assets | Where-Object { $_.name -match "ghidra_12\.0\.4.*reverse-engineering-assistant.*\.zip" -and $_.name -notmatch "symbols" } | Select-Object -First 1 -ExpandProperty browser_download_url
          Invoke-WebRequest -Uri $downloadUrl -OutFile (Split-Path $downloadUrl -Leaf)
          $fileName = Split-Path $downloadUrl -Leaf
          Expand-Archive -Path $fileName -DestinationPath "."
          Remove-Item $filename -Force
          echo "Step 5 Completed"
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/starsong-consulting/GhydraMCP/releases/latest"
          $downloadUrl = $release.assets | Where-Object { $_.name -match "^GhydraMCP-v.*\.zip$" -and $_.name -notmatch "symbols" } | Select-Object -First 1 -ExpandProperty browser_download_url
          Invoke-WebRequest -Uri $downloadUrl -OutFile (Split-Path $downloadUrl -Leaf)
          $fileName = Split-Path $downloadUrl -Leaf
          Expand-Archive -Path $fileName -DestinationPath "."
          Remove-Item $filename -Force
          



      - name: Keep alive for 6 hours
        shell: powershell
        run: |
          Write-Host "=== KEEPING WORKFLOW ALIVE ==="
          Write-Host "Parsec and AHK running in background"
          Write-Host "==============================="
          
          $startTime = Get-Date
          while ((New-TimeSpan -Start $startTime -End (Get-Date)).TotalHours -lt 6) {
              Write-Host "[$(Get-Date)] Still alive..."
              Start-Sleep -Seconds 600
          }
