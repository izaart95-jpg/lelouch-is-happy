name: SISYPHUS-AGENT

on:
  workflow_dispatch:

jobs:
  parsec-ahk-automation:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Create working directory
        shell: powershell
        run: |
          $workDir = "$env:GITHUB_WORKSPACE\parsec-automation"
          $screenshotDir = "$env:GITHUB_WORKSPACE\screenshots"
          New-Item -ItemType Directory -Path $workDir -Force
          New-Item -ItemType Directory -Path $screenshotDir -Force
          Set-Location $workDir
          echo "WORK_DIR=$workDir" >> $env:GITHUB_ENV
          echo "SCREENSHOT_DIR=$screenshotDir" >> $env:GITHUB_ENV

      - name: Install Python dependencies
        shell: powershell
        run: |
          Write-Host "Installing dependencies..."
          py -3.11 -m pip install uv
          npm i -g pnpm *>$null
          pnpm setup | Out-Null
          py -3.11 -m uv pip install mcp mcp-server-ida x64dbg_automate[mcp] meson requests google-api-python-client google-auth google-auth-oauthlib 
          Write-Host "Dependencies installed"          
          
      - name: Download and extract Project.zip
        shell: powershell
        run: |
          $projectUrl = "https://archive.org/download/project_202512/1-project.zip"
          $zipPath = "C:\Project.zip"
          
          Write-Host "Downloading Project.zip..."
          Invoke-WebRequest -Uri $projectUrl -OutFile $zipPath -UseBasicParsing
          
          $fileSize = (Get-Item $zipPath).Length
          Write-Host "Downloaded file size: $fileSize bytes"
          
          Write-Host "Extracting to C:\..."
          Expand-Archive -Path $zipPath -DestinationPath "C:\" -Force
          
          Write-Host "Contents of C:\Project:"
          Get-ChildItem "C:\Project" -Recurse | Format-Table Name, Length
          
          Write-Host "Project extracted successfully"


      - name: Download and install AutoHotkey v2
        shell: powershell
        run: |
          $ahkUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.19/AutoHotkey_2.0.19_setup.exe"
          $ahkPath = "$env:WORK_DIR\AutoHotkey_Setup.exe"
          
          Write-Host "Downloading AutoHotkey from official source..."
          Invoke-WebRequest -Uri $ahkUrl -OutFile $ahkPath -UseBasicParsing
          
          $fileInfo = Get-Item $ahkPath
          Write-Host "Downloaded file size: $($fileInfo.Length) bytes"
          
          Write-Host "Installing AutoHotkey..."
          Start-Process -FilePath $ahkPath -ArgumentList "/silent" -Wait
          
          Write-Host "AutoHotkey installed successfully"

      - name: Create AutoHotkey script
        shell: powershell
        run: |
          $scriptContent = @'
          Sleep 3000
          Send "ffbewafa709@gmail.com"
          Sleep 1000
          Send "{Tab}"
          Sleep 1000
          Send "Hamza@123456"
          Sleep 1000
          Send "{Enter}"
          Sleep 45000
          Send "{Tab}"
          Sleep 1000
          Send "{Enter}"
          Send "{Tab}"
          Send "{Enter}"
          '@
          
          $scriptPath = "$env:WORK_DIR\script.ahk"
          $scriptContent | Out-File -FilePath $scriptPath -Encoding UTF8
          echo "AHK_SCRIPT_PATH=$scriptPath" >> $env:GITHUB_ENV
          
          Write-Host "Created AHK script at: $scriptPath"
          Write-Host "Script content:"
          Get-Content $scriptPath

      - name: Download and install Parsec
        shell: powershell
        run: |
          $parsecUrl = "https://builds.parsec.app/package/parsec-windows.exe"
          $parsecPath = "$env:WORK_DIR\parsec-windows.exe"
          Invoke-WebRequest -Uri $parsecUrl -OutFile $parsecPath
          Start-Process -FilePath $parsecPath -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 20
          echo "Parsec installed"

      - name: Run AHK and connect 
        shell: powershell
        run: |
          $ahkUX = "C:\Program Files\AutoHotkey\UX\AutoHotkeyUX.exe"
          $ahkV2 = "C:\Program Files\AutoHotkey\v2\AutoHotkey.exe"
          $ahk64 = "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe"
          $ahk32 = "C:\Program Files\AutoHotkey\v2\AutoHotkey32.exe"
          
          # Start Parsec
          Start-Process "parsec:" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5
          
          # Find AutoHotkey
          $ahkExe = $null
          if (Test-Path $ahkUX) { $ahkExe = $ahkUX }
          elseif (Test-Path $ahkV2) { $ahkExe = $ahkV2 }
          elseif (Test-Path $ahk64) { $ahkExe = $ahk64 }
          elseif (Test-Path $ahk32) { $ahkExe = $ahk32 }
          
          if ($ahkExe) {
              Write-Host "Using AutoHotkey: $ahkExe"
              Start-Process -FilePath $ahkExe -ArgumentList "`"$env:AHK_SCRIPT_PATH`""
              $ahkStartTime = Get-Date
              Write-Host "AHK script started at: $ahkStartTime"
          }
          else {
              Write-Host "AutoHotkey NOT FOUND!"
              Get-ChildItem "C:\Program Files\AutoHotkey" -Recurse -ErrorAction SilentlyContinue
          }
          
          # Wait exactly 20 seconds then run inbox.py
          Write-Host "Waiting 20 seconds before running inbox.py..."
          Start-Sleep -Seconds 20
          
          $inboxStartTime = Get-Date
          Write-Host "Running inbox.py at: $inboxStartTime (exactly 20s after AHK)"
          
          # Run inbox.py hidden using pythonw
          pyw -3.11 C:\Project\inbox.py
          Write-Host "inbox.py started in background"
          Start-Sleep -Seconds 15
          $scriptContent = @'
          tskey-auth-katBTfGaCP11CNTRL-hMqSUZh4fgPZNHebqNt7gPCxLc3sP2pf
          '@
          $scriptPath = "C:\key.txt"
          $scriptContent | Out-File -FilePath $scriptPath -Encoding UTF8
          
          # ---- Install Tailscale (Skip if installed) ----
          try {
            $tailscalePath = "$env:ProgramFiles\Tailscale\tailscale.exe"
            if (-not (Test-Path $tailscalePath)) {
               $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
               $installerPath = "$env:TEMP\tailscale.msi"
           
              Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
              Start-Process msiexec.exe -ArgumentList "/i", $installerPath, "/quiet", "/norestart" -Wait
              Remove-Item $installerPath -Force
            } else {
              Write-Host "Config set Running Task"
            }
          }
          catch { exit 1 }
          try {
             $tailscaleExe = "$env:ProgramFiles\Tailscale\tailscale.exe"
             
             $base64Key = "dHNrZXktYXV0aC1rVE1CcmRQa2g2MjFDTlRSTC1YUDM2Z21XaUVEWFJkSEpuNkJIWkNYbW9HUjV6ankzaTc="
             # 2. Decode the Base64 string into a Byte Array
             $keyBytes = [System.Convert]::FromBase64String($base64Key)
             # 3. Convert those Bytes into the actual Auth Key string
             $authKey = [System.Text.Encoding]::UTF8.GetString($keyBytes).Trim()
             # Verification
             Write-Host "Auth key successfully decoded and loaded."
             
             # Ensure service exists and auto-start is correct
             Set-Service "Tailscale" -StartupType Automatic -ErrorAction SilentlyContinue
             Start-Service "Tailscale" -ErrorAction SilentlyContinue
             $status = & $tailscaleExe status 2>$null
             if ($status -notlike "*Connected*") {
                Write-Host "Connecting to Tailscale..."
                & $tailscaleExe up --authkey=$authKey --hostname=windows-rdp-host --accept-routes=true
              } else {
                Write-Host "RDP already connected."
              }
          }
          catch { exit 1 }
          
      - name: Build Set MCP and apps
        shell: powershell
        run: |      
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 1 - BASE TOOLING                         
          # ════════════════════════════════════════════════════════════════          
          choco install temurin21 --yes *>$null          
          choco install ghidra    *>$null          
          choco install wget      *>$null
          winget install -e --id Microsoft.VisualStudioCode --accept-package-agreements --accept-source-agreements --silent
          & "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin\code.cmd" --install-extension  kilocode.kilo-code
          npm i -g supergateway *>$null
          npm i -g mcp-gdb *>$null
          npm i -g binary-ninja-mcp *>$null
          $temp = $env:TEMP
          curl.exe -L -o $temp/bridge_mcp_hydra.py https://raw.githubusercontent.com/starsong-consulting/GhydraMCP/refs/heads/main/bridge_mcp_hydra.py 
          curl.exe -L -o $temp/bridge_mcp_ghidra.py https://raw.githubusercontent.com/bethington/ghidra-mcp/refs/heads/main/bridge_mcp_ghidra.py
          curl.exe -L -o $temp/x64dbg.py https://raw.githubusercontent.com/Wasdubya/x64dbgMCP/refs/heads/main/src/x64dbg.py
          git clone https://github.com/Invoke-RE/binja-lattice-mcp "$temp\binja-lattice-mcp"
          cd $temp\binja-lattice-mcp
          Get-ChildItem -Path . -Exclude "lib", "mcp_server.py", "lattice_client.py" | Remove-Item -Recurse -Force
          
          $dl = "$env:USERPROFILE\Downloads"          
          echo "Section 1 Completed - Base tooling installed"          
          
          
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 2 - x64dbg : Download & Layout                                 
          # ════════════════════════════════════════════════════════════════          
          cd $dl          
          $release = Invoke-RestMethod "https://api.github.com/repos/x64dbg/x64dbg/releases/latest"          
          $url = $release.assets |          
              Where-Object { $_.name -match "^snapshot_.*\.zip$" -and $_.name -notmatch "symbols" } |          
              Select-Object -First 1 -ExpandProperty browser_download_url          
          Invoke-WebRequest $url -OutFile (Split-Path $url -Leaf) *>$null          
          mkdir x64dbg          
          unzip snapshot_*zip -d x64dbg *>$null          
          Remove-Item (Split-Path $url -Leaf) -Force *>$null          
          mkdir -p x64dbg/release/x64/plugins/x64dbg-mcp, x64dbg/release/x32/plugins/x64dbg-mcp *>$null          
          $plugins_x64 = "$dl/x64dbg/release/x64/plugins/"          
          $plugins_x32 = "$dl/x64dbg/release/x32/plugins/"          
          
          $mcpConfig = '{"features":{"auto_start_mcp_on_plugin_load":true,"enable_batch_requests":true,"enable_heartbeat":true,"enable_notifications":true,"heartbeat_interval_seconds":30},"logging":{"console_output":true,"enabled":true,"file":"plugin.log","level":"info","max_file_size_mb":10},"permissions":{"allow_breakpoint_modification":true,"allow_memory_write":true,"allow_register_write":true,"allow_script_execution":true,"allowed_methods":["assembler.*","bookmark.*","breakpoint.*","comment.*","context.*","debug.*","disasm.*","disassembly.*","dump.*","eval.*","function.*","memory.*","module.*","patch.*","register.*","script.*","stack.*","symbol.*","thread.*","xref.*"]},"server":{"address":"0.0.0.0","port":3001},"timeout":{"memory_read_timeout_ms":5000,"request_timeout_ms":30000,"step_timeout_ms":10000},"version":"1.0.6"}'          
          # Write without BOM using .NET directly (works on PS 5.x)
          [System.IO.File]::WriteAllText("$plugins_x64\x64dbg-mcp\config.json", ($mcpConfig | jq '.'), [System.Text.UTF8Encoding]::new($false))
          [System.IO.File]::WriteAllText("$plugins_x32\x64dbg-mcp\config.json", ($mcpConfig | jq '.'), [System.Text.UTF8Encoding]::new($false))
          $iniBlock = "[XAutomate]`r`nBindAddress=0.0.0.0`r`nMode=remote`r`nPubSubPort=69BA`r`nReqRepPort=69BB`r`n"          
          $iniBlock | Out-File -FilePath "$dl\x64dbg\release\x64\x64dbg.ini" -Append -Encoding UTF8          
          $iniBlock | Out-File -FilePath "$dl\x64dbg\release\x32\x32dbg.ini" -Append -Encoding UTF8          
          echo "Section 2 Completed - x64dbg layout ready"          
          
          
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 3 - x64dbgMCP : Build from Source (BACKGROUND)                 
          # ════════════════════════════════════════════════════════════════          
          #  Kicked off immediately; we Wait-Job before Section 6 which              
          #  copies the built .dp64 / .dp32 into the plugins folder.                 
          $jobX64MCP = Start-Job -Name "x64dbgMCP_Build" -ScriptBlock {          
              param($dl)          
              git clone https://github.com/Wasdubya/x64dbgMCP $dl\x64dbgMCP 2>&1 | Out-Null          
              Remove-Item "$dl\x64dbgMCP\deps" -Recurse -Force -ErrorAction SilentlyContinue          
              New-Item -ItemType Directory "$dl\x64dbgMCP\deps" -Force | Out-Null          
              Copy-Item -Recurse "$dl\x64dbg\pluginsdk\*" "$dl\x64dbgMCP\deps"          
              $cpp = "$dl\x64dbgMCP\src\MCPx64dbg.cpp"          
              (Get-Content $cpp) -replace 'htonl\(INADDR_LOOPBACK\)', 'htonl(INADDR_ANY)' | Set-Content $cpp          
              cmake -S "$dl\x64dbgMCP" -B "$dl\x64dbgMCP\build" *>$null          
              cmake --build "$dl\x64dbgMCP\build" --target all_plugins --config Release *>$null          
          } -ArgumentList $dl          
          echo "Section 3 Started - x64dbgMCP building in background (job: $($jobX64MCP.Id))"          
          
          
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 4 - Ghidra Extensions                                           
          # ════════════════════════════════════════════════════════════════          
          $ext = "$env:APPDATA\ghidra\ghidra_12.0.4_PUBLIC\Extensions"          
          New-Item -ItemType Directory $ext -Force | Out-Null          
          
          foreach ($repo in @(          
              "cyberkaida/reverse-engineering-assistant|ghidra_12\.0\.4.*reverse-engineering-assistant.*\.zip",          
              "starsong-consulting/GhydraMCP|^GhydraMCP-v.*\.zip$",          
              "bethington/ghidra-mcp|^GhidraMCP-\d+\.\d+\.\d+\.zip$"          
          )) {          
              $r, $pat = $repo -split "\|"          
              $url = (Invoke-RestMethod "https://api.github.com/repos/$r/releases/latest").assets |          
                  Where-Object { $_.name -match $pat -and $_.name -notmatch "symbols" } |          
                  Select-Object -First 1 -ExpandProperty browser_download_url          
              $file = Split-Path $url -Leaf          
              Invoke-WebRequest $url -OutFile "$ext\$file"          
              Expand-Archive "$ext\$file" -DestinationPath $ext *>$null          
              Remove-Item "$ext\$file" -Force          
          }          
          echo "Section 4 Completed - Ghidra extensions installed"          
          
          
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 5 - Binary Ninja : Download via filecr (BACKGROUND)             
          # ════════════════════════════════════════════════════════════════          
          #  Long download + installer; runs in background.                           
          #  We Wait-Job before touching BN plugin folders.                           
          $jobBinja = Start-Job -Name "BinaryNinja_Install" -ScriptBlock {          
              param($dl)          
              $curlArgs = @("-s","https://filecr.com/api/actions/downloadlink/?id=300395","-H","User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36","-H","Accept: application/json, text/plain, */*","-H","Referer: https://filecr.com/","-H","Origin: https://filecr.com")          
              $downloadInfo = curl.exe @curlArgs | ConvertFrom-Json          
              $downloadUrl = $downloadInfo.url          
              $downloadedFile = "$dl\BinaryNinja.zip"          
              curl.exe -sL -o $downloadedFile $downloadUrl 2>$null          
              Get-ChildItem "$dl" -File -Filter "Vector 35 Binary Ninja*" | Move-Item -Destination $downloadedFile          
              7z x $downloadedFile -p123 -y -o"$dl"          
              Remove-Item $downloadedFile -Force          
              Get-ChildItem "$dl" -Directory -Filter "Vector 35 Binary Ninja*" | Move-Item -Destination "$dl\BinaryNinja"          
              cd "$dl\BinaryNinja"          
              Get-ChildItem -Filter "*exe" | ForEach-Object { Start-Process $_.FullName -ArgumentList '/S' -Wait }          
              Copy-Item -Recurse "$dl\BinaryNinja\crack\binaryninjacore.dll" "$env:LOCALAPPDATA\Programs\Vector35\BinaryNinja\" -Force          
          } -ArgumentList $dl          
          echo "Section 5 Started - Binary Ninja downloading/installing in background (job: $($jobBinja.Id))"          
          
          
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 6 - IDA Pro : Download via filecr (BACKGROUND)                  
          # ════════════════════════════════════════════════════════════════          
          #  Longest task. Started immediately, waited on before plugin setup.        
          $jobIDA = Start-Job -Name "IDA_Install" -ScriptBlock {          
              param($dl)          
              $curlArgs = @("-s","https://filecr.com/api/actions/downloadlink/?id=314603","-H","User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36","-H","Accept: application/json, text/plain, */*","-H","Referer: https://filecr.com/","-H","Origin: https://filecr.com")          
              $downloadInfo = curl.exe @curlArgs | ConvertFrom-Json          
              $downloadUrl = $downloadInfo.url          
              $downloadedFile = "$dl\IDA-Pro.zip"          
              curl.exe -sL -o $downloadedFile $downloadUrl 2>$null          
              Get-ChildItem "$dl" -File -Filter "IDA*" | Move-Item -Destination $downloadedFile          
              7z x $downloadedFile -p123 -y -o"$dl"          
              Remove-Item $downloadedFile -Force          
              $ida = Get-ChildItem -Path $dl -Directory -Filter "IDA*" | Select-Object -ExpandProperty FullName          
              $licenseDir = "$env:APPDATA\Hex-Rays\IDA Pro"          
              New-Item -ItemType Directory -Path $licenseDir -Force | Out-Null          
              curl.exe -sL -o "$licenseDir\idapro.hexlic" https://raw.githubusercontent.com/benzis-alt/IDA-Pro-9.1/refs/heads/main/other%20files%20you%20need/idapro.hexlic 2>$null          
              cd "$ida"          
              $exe = Get-ChildItem -File -Filter "ida*exe" | Select-Object -ExpandProperty FullName          
              & $exe --mode unattended --installer-language en --prefix "C:\Program Files\ida-pro-9.3" --install_python 1          
              Start-Sleep 25          
              Copy-Item ".\fix*\*" "C:\Program Files\ida-pro-9.3\" -Recurse -Force          
              & "C:\Program Files\ida-pro-9.3\ida.exe"          
              Start-Sleep 10          
              taskkill /IM ida.exe /F          
          } -ArgumentList $dl          
          echo "Section 6 Started - IDA Pro downloading/installing in background (job: $($jobIDA.Id))"          
          
          
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 7 - x64dbg-automate Plugins + x64dbg-mcp Plugins               
          #  (depends on Section 2 layout - already done; no wait needed)             
          # ════════════════════════════════════════════════════════════════          
          # x64dbg-automate x32          
          $release = Invoke-RestMethod "https://api.github.com/repos/dariushoule/x64dbg-automate/releases/latest"          
          $url = $release.assets |          
              Where-Object { $_.name -match "^release32-\d+\.\d+\.\d+-.*\.zip$" -and $_.name -notmatch "symbols" } |          
              Select-Object -First 1 -ExpandProperty browser_download_url          
          $file = Split-Path $url -Leaf          
          Invoke-WebRequest $url -OutFile $file *>$null          
          Expand-Archive $file -DestinationPath "$dl\x64dbg\release\x32\plugins" *>$null          
          Remove-Item $file -Force          
          
          # x64dbg-automate x64          
          $release = Invoke-RestMethod "https://api.github.com/repos/dariushoule/x64dbg-automate/releases/latest"          
          $url = $release.assets |          
              Where-Object { $_.name -match "^release64-\d+\.\d+\.\d+-.*\.zip$" -and $_.name -notmatch "symbols" } |          
              Select-Object -First 1 -ExpandProperty browser_download_url          
          $file = Split-Path $url -Leaf          
          Invoke-WebRequest $url -OutFile $file          
          Expand-Archive $file -DestinationPath "$dl\x64dbg\release\x64\plugins" *>$null          
          Remove-Item $file -Force          
          Move-Item "$dl\x64dbg\release\x64\plugins\Release\*" "$dl\x64dbg\release\x64\plugins"          
          Remove-Item "$dl\x64dbg\release\x64\plugins\Release\" -Recurse -Force          
          
          # x64dbg-mcp prebuilt dp32/dp64          
          $release = Invoke-RestMethod "https://api.github.com/repos/SetsunaYukiOvO/x64dbg-mcp/releases/latest"          
          $assets = $release.assets | Where-Object { $_.name -match "x(32|64)dbg_mcp\.dp(32|64)$" }          
          foreach ($asset in $assets) {          
              $url  = $asset.browser_download_url          
              $file = $asset.name          
              $dir  = if ($file -match "\.dp64$") { $plugins_x64 } else { $plugins_x32 }          
              Invoke-WebRequest $url -OutFile "$dir/$file" *>$null          
              Write-Host "Downloaded: $file"          
          }          
          echo "Section 7 Completed - x64dbg-automate and x64dbg-mcp plugins placed"          
          
          
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 8 - Sync Point: wait for x64dbgMCP build, then place DLLs       
          # ════════════════════════════════════════════════════════════════          
          echo "Waiting for x64dbgMCP source build to finish..."          
          Wait-Job -Job $jobX64MCP | Out-Null          
          Receive-Job -Job $jobX64MCP          
          Move-Item "$dl\x64dbgMCP\build\build64\Release\MCPx64dbg.dp64" "$dl\x64dbg\release\x64\plugins"          
          Move-Item "$dl\x64dbgMCP\build\build32\Release\MCPx64dbg.dp32" "$dl\x64dbg\release\x32\plugins"          
          Remove-Item "$dl\x64dbgMCP" -Recurse -Force          
          echo "Section 8 Completed - x64dbgMCP plugins placed"          
          
          
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 9 - Sync Point: wait for Binary Ninja, then configure            
          # ════════════════════════════════════════════════════════════════          
          echo "Waiting for Binary Ninja install to finish..."          
          Wait-Job -Job $jobBinja | Out-Null          
          Receive-Job -Job $jobBinja -ErrorAction SilentlyContinue 2>$null          
          
          # License          
          $licenseDir = "$env:APPDATA\Binary Ninja"          
          New-Item -ItemType Directory "$licenseDir\plugins" -Force | Out-Null          
          $licenseContent = @'          
          [          
          {          
          "count": 32,          
          "created": "2026-04-04T16:51:16.00+00:00",          
          "data": "",          
          "email": "binja@incorporated.inc",          
          "product": "Binary Ninja Personal",          
          "serial": "1b1cddb8810bee2d6ab01b96a1ff9532",          
          "signature": "",          
          "type": "User",          
          "released" : "amped"          
          }          
          ]          
          '@          
          $licenseContent | Out-File -FilePath "$licenseDir\license.dat" -Encoding UTF8 -Force          
          
          # Plugins          
          cd "$licenseDir\plugins\"          
          git clone https://github.com/fosdickio/binary_ninja_mcp.git          
          $cpp = "binary_ninja_mcp\plugin\__init__.py"          
          (Get-Content $cpp) -replace 'plugin\.config\.server\.host = "0\.0\.0\.0" if expose_to_network else "localhost"', 'plugin.config.server.host = "0.0.0.0"' | Set-Content $cpp          
          
          git clone https://github.com/Invoke-RE/binja-lattice-mcp.git          
          Copy-Item -Recurse "binja-lattice-mcp\plugin\*" "$licenseDir\plugins\"          
          $config = Get-Content config.ini          
          $config = $config -replace 'ip_address = "127\.0\.0\.1"', 'ip_address = 0.0.0.0'          
          $config = $config -replace 'api_key = "use_a_strong_api_key_here"', 'api_key = Waguri'          
          $config | Set-Content config.ini          
          Remove-Item "binja-lattice-mcp" -Recurse -Force          
          echo "Section 9 Completed - Binary Ninja configured with plugins"          
          
          
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 10 - Sync Point: wait for IDA Pro, then configure                
          # ════════════════════════════════════════════════════════════════          
          echo "Waiting for IDA Pro install to finish..."          
          Wait-Job -Job $jobIDA | Out-Null          
          Receive-Job -Job $jobIDA -ErrorAction SilentlyContinue 2>$null          
          
          $pluginDir = "$env:APPDATA\Hex-Rays\IDA Pro\plugins\"          
          New-Item -ItemType Directory $pluginDir -Force | Out-Null          
          
          # ida-pro-mcp          
          pip install https://github.com/mrexodia/ida-pro-mcp/archive/refs/heads/main.zip | Out-Null          
          ida-pro-mcp --install cline --scope global --transport streamable-http | Out-Null          
          $cpp = "$pluginDir\ida_mcp.py"          
          (Get-Content $cpp) -replace 'DEFAULT_HOST = "127\.0\.0\.1"', 'DEFAULT_HOST = "0.0.0.0"' | Set-Content $cpp          
          
          # ida-mcp-server          
          cd $pluginDir          
          git clone https://github.com/MxIris-Reverse-Engineering/ida-mcp-server          
          Get-ChildItem -Path "ida-mcp-server" -Exclude "plugin" | Remove-Item -Recurse -Force          
          Get-ChildItem -Path "ida-mcp-server\plugin" | Move-Item -Destination $pluginDir          
          Remove-Item "ida-mcp-server" -Recurse -Force          
          $cpp = "$pluginDir\ida_mcp_server_plugin.py"          
          (Get-Content $cpp) -replace 'DEFAULT_HOST = "localhost"', 'DEFAULT_HOST = "0.0.0.0"' | Set-Content $cpp          
          echo "Section 10 Completed - IDA Pro configured with plugins"          
          


          # ════════════════════════════════════════════════════════════════          
          #  SECTION 11 - Radare2 Install                                           
          # ════════════════════════════════════════════════════════════════          
          $env:PATH += ";C:\hostedtoolcache\windows\Python\3.11.9\x64\Scripts"
          $down_path = "$env:TEMP/radare2.zip"
          curl.exe -L -o "$down_path" https://github.com/izaart95-jpg/smooch/releases/download/1.0/radare2-windows-6.1.5.zip
          $r2 = "C:\Tools\Radare2"
          mkdir -p "$r2"
          Expand-Archive -Path $down_path -DestinationPath $r2 -Force
          $folder = "$r2\bin"
          $oldPath = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if (-not $oldPath.Split(';') -contains $folder) {
              # Append the folder
              $newPath = $oldPath + ";" + $folder
              [Environment]::SetEnvironmentVariable("Path", $newPath, "Machine")
              Write-Host "Added $folder to system PATH. Restart your terminal to apply."
          } else {
              Write-Host "$folder is already in PATH."
          }
          $env:PATH += ";$folder"


          r2pm -U
          r2pm -ci r2mcp
          # ════════════════════════════════════════════════════════════════          
          #  SECTION 12 - Launch everything                                           
          # ════════════════════════════════════════════════════════════════          
          & "C:\Program Files\ida-pro-9.3\ida.exe"          
          & "$dl\x64dbg\release\x64\x64dbg.exe"          
          echo "Section 11 Completed - All tools launched"
          

          
      - name: Keep alive for 6 hours
        shell: powershell
        run: |
          Write-Host "=== KEEPING WORKFLOW ALIVE ==="
          Write-Host "Parsec and AHK running in background"
          Write-Host "==============================="
          supergateway --stdio "mcp-gdb" --outputTransport streamableHttp --port 8000 --host 0.0.0.0 | Out-Null
          
          $startTime = Get-Date
          while ((New-TimeSpan -Start $startTime -End (Get-Date)).TotalHours -lt 6) {
              Write-Host "[$(Get-Date)] Still alive..."
              Start-Sleep -Seconds 600
          }
